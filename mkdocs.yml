site_name: langgraph-oracle
site_description: OCI-oriented facilities for LangGraph, starting with an Oracle ADB checkpointer.
site_url: https://luigisaetta.github.io/langgraph-oracle/
repo_url: https://github.com/luigisaetta/langgraph-oracle
repo_name: luigisaetta/langgraph-oracle

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

nav:
  - Home: index.md
  - Oracle ADB Checkpointer: oracle-adb-checkpointer.md
  - Publishing to PyPI: releasing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
